spring.application.name=tickethub
#PostgreSQL database connection settings
spring.datasource.url=${DB_URL:jdbc:postgresql://tickethub-db:5432/tickethub}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#JPA/Hibernate settings
#Prevents hibernate from changing and verifying the database schemas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

#Prevents hibernate from changing the column names to snake_case
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

#Path for event flyers
#local development
#app.images.directory=flyer_img
#Production. Docker image
app.images.directory=/app/flyer_img