services:
  postgres-db:
    image: postgres:15
    restart: always
    container_name: evant_db
    environment:
      POSTGRES_DB: evant_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Eva01
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: